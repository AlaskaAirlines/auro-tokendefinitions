name: PR Workflow

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches-ignore:
      - 'rc/**'
      - 'main'

jobs:
  action:
    uses: AlaskaAirlines/auro-actions/.github/workflows/no-build_pull-request.yml@main
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}